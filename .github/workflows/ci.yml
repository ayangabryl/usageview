name: Build Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Verify build compiles
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app

      - name: Resolve packages
        run: xcodebuild -resolvePackageDependencies -project Usageview.xcodeproj -scheme Usageview

      - name: Build (no signing)
        run: |
          xcodebuild build \
            -project Usageview.xcodeproj \
            -scheme Usageview \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || xcodebuild build \
              -project Usageview.xcodeproj \
              -scheme Usageview \
              -configuration Debug \
              CODE_SIGNING_ALLOWED=NO
