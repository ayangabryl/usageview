name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build & Release
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Import signing certificate
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          echo "$CERTIFICATE_P12" | base64 --decode -o $RUNNER_TEMP/certificate.p12
          security create-keychain -p "" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "" $KEYCHAIN_PATH
          security import $RUNNER_TEMP/certificate.p12 \
            -k $KEYCHAIN_PATH \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security list-keychain -d user -s $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -s -k "" $KEYCHAIN_PATH
          echo "KEYCHAIN_NAME=$KEYCHAIN_PATH" >> $GITHUB_ENV

      - name: Install Swift 6.2 toolchain
        run: |
          # Download the official Swift 6.2 release toolchain from swift.org
          PKG_URL="https://download.swift.org/swift-6.2-release/xcode/swift-6.2-RELEASE/swift-6.2-RELEASE-osx.pkg"
          curl -fL --retry 3 -o /tmp/swift.pkg "$PKG_URL"
          sudo installer -pkg /tmp/swift.pkg -target /
          BUNDLE_ID=$(plutil -extract CFBundleIdentifier raw \
            /Library/Developer/Toolchains/swift-6.2-RELEASE.xctoolchain/Info.plist)
          echo "TOOLCHAINS=$BUNDLE_ID" >> $GITHUB_ENV
          echo "Installed toolchain: $BUNDLE_ID"

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build, sign & notarize DMG
        env:
          CODE_SIGN_IDENTITY: ${{ secrets.CODE_SIGN_IDENTITY }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          chmod +x Scripts/build-dmg.sh
          ./Scripts/build-dmg.sh

      - name: Sign DMG with Sparkle EdDSA
        id: sparkle
        run: |
          VERSION=$(grep 'MARKETING_VERSION' Usageview.xcodeproj/project.pbxproj \
            | head -1 | sed 's/.*= //' | sed 's/;//' | tr -d '[:space:]')
          DMG="build/Usageview-${VERSION}.dmg"

          SPARKLE_BIN=$(find build/DerivedData -name "sign_update" -type f 2>/dev/null | head -1)
          if [ -z "$SPARKLE_BIN" ]; then
            echo "❌ sign_update not found in DerivedData"
            exit 1
          fi

          SIGN_OUTPUT=$("$SPARKLE_BIN" "$DMG")
          echo "$SIGN_OUTPUT"
          ED_SIG=$(echo "$SIGN_OUTPUT" | grep -o 'sparkle:edSignature="[^"]*"' \
            | sed 's/sparkle:edSignature="//;s/"//')
          DMG_LEN=$(echo "$SIGN_OUTPUT" | grep -o 'length="[^"]*"' \
            | sed 's/length="//;s/"//')

          echo "version=$VERSION"     >> $GITHUB_OUTPUT
          echo "dmg=$DMG"             >> $GITHUB_OUTPUT
          echo "ed_signature=$ED_SIG" >> $GITHUB_OUTPUT
          echo "dmg_length=$DMG_LEN"  >> $GITHUB_OUTPUT

      - name: Update appcast.xml
        run: |
          VERSION="${{ steps.sparkle.outputs.version }}"
          ED_SIG="${{ steps.sparkle.outputs.ed_signature }}"
          DMG_LEN="${{ steps.sparkle.outputs.dmg_length }}"
          BUILD=$(grep 'CURRENT_PROJECT_VERSION' Usageview.xcodeproj/project.pbxproj \
            | head -1 | sed 's/.*= //' | sed 's/;//' | tr -d '[:space:]')
          PUB_DATE=$(date -R)
          URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION}/Usageview-${VERSION}.dmg"

          printf '<?xml version="1.0" encoding="utf-8"?>\n<rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">\n  <channel>\n    <title>Usageview Updates</title>\n    <link>https://raw.githubusercontent.com/${{ github.repository }}/main/appcast.xml</link>\n    <description>Most recent changes with links to updates.</description>\n    <language>en</language>\n    <item>\n      <title>Version %s</title>\n      <pubDate>%s</pubDate>\n      <sparkle:version>%s</sparkle:version>\n      <sparkle:shortVersionString>%s</sparkle:shortVersionString>\n      <enclosure\n        url="%s"\n        sparkle:edSignature="%s"\n        length="%s"\n        type="application/octet-stream" />\n    </item>\n  </channel>\n</rss>\n' \
            "$VERSION" "$PUB_DATE" "$BUILD" "$VERSION" "$URL" "$ED_SIG" "$DMG_LEN" > appcast.xml

      - name: Commit & push appcast.xml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          git commit -m "Update appcast.xml for v${{ steps.sparkle.outputs.version }}" || true
          git push origin HEAD:main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.sparkle.outputs.dmg }}
          generate_release_notes: true
